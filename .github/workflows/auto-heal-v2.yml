name: Auto-Heal

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service that triggered this'
        required: false
        default: 'unknown'

jobs:
  heal:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write

    steps:
      # ── 1. Checkout & build check ─────────────────────────────────────────
      - name: Checkout staging
        uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript build errors
        id: tsc
        run: |
          set +e
          npx tsc --noEmit 2>&1 > /tmp/tsc_raw.txt
          TSC_EXIT=$?
          set -e
          grep -E "^[^:]+\.tsx?\([0-9]" /tmp/tsc_raw.txt | grep -v "__tests__" | grep -v "\.test\." | grep -v "\.spec\." > /tmp/tsc_errors.txt || true
          ERROR_COUNT=$(wc -l < /tmp/tsc_errors.txt | tr -d ' ')
          echo "has_errors=$([ "$TSC_EXIT" -ne 0 ] && [ "$ERROR_COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "--- TSC exit=$TSC_EXIT, non-test errors=$ERROR_COUNT ---"
          cat /tmp/tsc_errors.txt || true

      # ── 2. Warning email ──────────────────────────────────────────────────
      - name: Send warning email
        if: steps.tsc.outputs.has_errors == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          SERVICE: ${{ inputs.service }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"from\":\"Yotta Dev <onboarding@resend.dev>\",\"to\":[\"$ALERT_EMAIL\"],\"subject\":\"business-console DOWN - auto-fix in progress ($SERVICE)\",\"text\":\"Service $SERVICE is down. Attempting OpenRouter auto-fix. Run: $RUN_URL\"}"

      # ── 3. Try OpenRouter (DeepSeek) ──────────────────────────────────────
      - name: Try OpenRouter fix
        id: openrouter_fix
        if: steps.tsc.outputs.has_errors == 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "Auto-Heal Bot"
          git config user.email "auto-heal@yotta-space.com"

          BRANCH="auto-heal-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          ERRORS=$(cat /tmp/tsc_errors.txt)

          PROMPT="Fix ONLY these TypeScript build errors with minimal changes. Output ONLY a Python script that reads each affected file, makes the fix, and writes it back using open(). No explanations, no markdown fences, just valid Python code.\n\nErrors:\n$ERRORS"

          RESPONSE=$(curl -s -X POST https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"deepseek/deepseek-v4-flash\",\"messages\":[{\"role\":\"user\",\"content\":$(python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))" <<< "$PROMPT")}],\"max_tokens\":2000}")

          echo "OpenRouter response: $RESPONSE"

          SCRIPT=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              if 'error' in d:
                  print('# ERROR:', d.get('error', {}).get('message', ''))
              else:
                  msg = d.get('choices', [{}])[0].get('message', {})
                  content = msg.get('content') or msg.get('reasoning') or ''
                  lines = content.strip().split('\n')
                  if lines and lines[0].startswith('\`\`\`'):
                      lines = lines[1:]
                  if lines and lines[-1].strip() == '\`\`\`':
                      lines = lines[:-1]
                  print('\n'.join(lines))
          except Exception as e:
              print('# PARSE ERROR:', e)
          ")

          echo "--- Fix script ---"
          echo "$SCRIPT"

          if [ -n "$SCRIPT" ] && [[ "$SCRIPT" != "# ERROR:"* ]] && [[ "$SCRIPT" != "# PARSE ERROR:"* ]]; then
            echo "$SCRIPT" | python3 -c "import sys,textwrap; print(textwrap.dedent(sys.stdin.read()))" > /tmp/fix.py
            set +e
            python3 /tmp/fix.py
            PY_EXIT=$?
            set -e
            echo "Python fix exit: $PY_EXIT"

            # Verify — count non-test errors after fix
            npx tsc --noEmit 2>&1 > /tmp/tsc_raw_after.txt
            grep -E "^[^:]+\.tsx?\([0-9]" /tmp/tsc_raw_after.txt | grep -v "__tests__" | grep -v "\.test\." | grep -v "\.spec\." > /tmp/tsc_after.txt || true
            REMAINING=$(wc -l < /tmp/tsc_after.txt | tr -d ' ')

            if [ "$REMAINING" -eq 0 ]; then
              git add -A
              git commit -m "fix: auto-heal TypeScript errors via OpenRouter DeepSeek"
              echo "fixed_by=openrouter" >> $GITHUB_OUTPUT
              echo "commits=1" >> $GITHUB_OUTPUT
            else
              echo "OpenRouter fix did not resolve all errors ($REMAINING remaining)"
              echo "fixed_by=none" >> $GITHUB_OUTPUT
              echo "commits=0" >> $GITHUB_OUTPUT
              git checkout -- .
            fi
          else
            echo "OpenRouter returned no valid script"
            echo "fixed_by=none" >> $GITHUB_OUTPUT
            echo "commits=0" >> $GITHUB_OUTPUT
          fi

      # ── 4. Push PR if fixed ───────────────────────────────────────────────
      - name: Push fix branch and create PR
        id: create_pr
        if: steps.openrouter_fix.outputs.commits == '1'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git push origin "${{ steps.openrouter_fix.outputs.branch }}"
          PR_URL=$(gh pr create \
            --base staging \
            --head "${{ steps.openrouter_fix.outputs.branch }}" \
            --title "Auto-heal: fix TypeScript build errors (OpenRouter DeepSeek)" \
            --body "Service: ${{ inputs.service }}. Fixed by OpenRouter DeepSeek. Review before merging — merge triggers Zeabur redeploy.")
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      # ── 5. Result email ───────────────────────────────────────────────────
      - name: Send result email
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          SERVICE: ${{ inputs.service }}
          HAS_ERRORS: ${{ steps.tsc.outputs.has_errors }}
          PR_URL: ${{ steps.create_pr.outputs.pr_url }}
          BRANCH: ${{ steps.openrouter_fix.outputs.branch }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$HAS_ERRORS" != "true" ]; then
            SUBJECT="business-console DOWN - runtime issue ($SERVICE)"
            BODY="Build passes but service is down. Check Zeabur: https://zeabur.com"
          elif [ -n "$PR_URL" ]; then
            SUBJECT="Auto-fix ready - merge to deploy ($SERVICE)"
            BODY="Fixed by OpenRouter DeepSeek. PR: $PR_URL — merge triggers Zeabur redeploy."
          else
            SUBJECT="business-console DOWN - manual fix needed ($SERVICE)"
            BODY="OpenRouter could not fix automatically. git checkout $BRANCH, fix in VS Code, push. Run: $RUN_URL"
          fi
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"from\":\"Yotta Dev <onboarding@resend.dev>\",\"to\":[\"$ALERT_EMAIL\"],\"subject\":\"$SUBJECT\",\"text\":\"$BODY\"}"
