name: Auto-Heal

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service that triggered this (e.g. business-console staging)'
        required: false
        default: 'unknown'

jobs:
  heal:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout staging
        uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript build errors
        id: tsc
        run: |
          set +e
          npx tsc --noEmit 2>&1 | grep -v "^$" | grep -v "__tests__" > /tmp/tsc_errors.txt
          TSC_EXIT=$?
          set -e
          echo "has_errors=$([ $TSC_EXIT -ne 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Attempt Claude Code fix
        id: claude_fix
        if: steps.tsc.outputs.has_errors == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "Claude Auto-Heal"
          git config user.email "claude-autofix@yotta-space.com"

          BRANCH="auto-heal-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          ERRORS=$(cat /tmp/tsc_errors.txt)
          npx @anthropic-ai/claude-code@latest \
            --print \
            --dangerously-skip-permissions \
            "Fix these TypeScript build errors in this Next.js project. Minimal changes only — type-narrow or cast to fix each error. Do not refactor. After fixing run \`npx tsc --noEmit\` to verify. If it passes commit with message 'fix: auto-heal TypeScript build errors'. Stop after committing.

          TypeScript errors:
          $ERRORS"

          COMMITS=$(git log origin/staging..HEAD --oneline | wc -l | tr -d ' ')
          echo "commits=$COMMITS" >> $GITHUB_OUTPUT

      - name: Push fix branch and create PR
        id: create_pr
        if: steps.claude_fix.outputs.commits != '0' && steps.claude_fix.outputs.commits != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git push origin "${{ steps.claude_fix.outputs.branch }}"
          PR_URL=$(gh pr create \
            --base staging \
            --head "${{ steps.claude_fix.outputs.branch }}" \
            --title "Auto-heal: fix TypeScript build errors" \
            --body "Triggered by: ${{ inputs.service }}. Auto-generated by Claude Code. Review before merging.")
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Send email
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: |
          SERVICE="${{ inputs.service }}"
          HAS_ERRORS="${{ steps.tsc.outputs.has_errors }}"
          COMMITS="${{ steps.claude_fix.outputs.commits }}"
          PR_URL="${{ steps.create_pr.outputs.pr_url }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ -n "$PR_URL" ]; then
            SUBJECT="Auto-fix ready for review — business-console ($SERVICE)"
            BODY="Service $SERVICE is down. Claude Code created a fix. PR: $PR_URL — merge to redeploy."
          elif [ "$HAS_ERRORS" = "true" ]; then
            SUBJECT="business-console DOWN — manual fix needed ($SERVICE)"
            BODY="Build errors found but Claude Code could not fix. Actions run: $RUN_URL"
          else
            SUBJECT="business-console DOWN — runtime issue ($SERVICE)"
            BODY="Build passes but service is down. Check Zeabur logs."
          fi

          cat > /tmp/email.json <<JSONEOF
          {
            "from": "Yotta Dev Bot <onboarding@resend.dev>",
            "to": ["$ALERT_EMAIL"],
            "subject": "$SUBJECT",
            "text": "$BODY"
          }
          JSONEOF

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d @/tmp/email.json)
          echo "Resend response: $RESPONSE"
